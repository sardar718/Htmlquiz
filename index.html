width. Now use CSS width property instead."}, {"s": "Tables & Lists", "d": "hard", "q": "Which value of `<table>` rules attribute shows only lines between rows?", "o": ["rows", "cols", "all", "groups"], "a": 0, "e": "rules=\"rows\" draws dividers only between rows. rules=\"cols\" between columns, rules=\"all\" everywhere."}, {"s": "Tables & Lists", "d": "hard", "q": "What is the purpose of `<colgroup span='3'>` on a table?", "o": ["It spans 3 rows", "It spans 3 columns with one rule", "It applies styles to the first 3 columns", "It creates 3 column headers"], "a": 2, "e": "<colgroup span=\"3\"> targets the first 3 columns as a group, allowing a single style rule for all three."}, {"s": "Tables & Lists", "d": "medium", "q": "Which element is used as the container for ALL table structure elements?", "o": ["<section>", "<table>", "<grid>", "<data>"], "a": 1, "e": "<table> is the root container. All tr, th, td, thead, tbody, and tfoot elements go inside it."}, {"s": "Tables & Lists", "d": "medium", "q": "Can a `<th>` element appear inside `<tbody>`?", "o": ["No, only in <thead>", "Yes, with scope='row' for row headers", "Only in the first column", "Only in <tfoot>"], "a": 1, "e": "<th scope=\"row\"> in <tbody> is valid and accessible — it marks the leftmost cell as a row header."}, {"s": "Tables & Lists", "d": "hard", "q": "What happens when you omit `<tbody>` from a table in HTML?", "o": ["Error", "Table doesn't render", "Browser inserts <tbody> automatically", "Rows go directly under <table>"], "a": 2, "e": "Browsers auto-insert <tbody> around <tr> elements when it's omitted. The DOM always has a tbody."}, {"s": "Tables & Lists", "d": "hard", "q": "Which attribute on `<ul>` or `<ol>` was used to set a custom list marker (now deprecated)?", "o": ["bullet", "type", "marker", "style"], "a": 1, "e": "type=\"circle\" or type=\"square\" on <ul> set bullet style. Now use CSS list-style-type instead."}, {"s": "Tables & Lists", "d": "hard", "q": "Which CSS property is the modern replacement for the `type` attribute on lists?", "o": ["list-marker", "bullet-style", "list-style-type", "list-type"], "a": 2, "e": "CSS list-style-type: upper-roman replaces the HTML type attribute for controlling list counters/markers."}, {"s": "Tables & Lists", "d": "hard", "q": "Which CSS property makes a list not show any bullet or number?", "o": ["list-style-type: zero", "list-style-type: hidden", "list-style-type: none", "list-style: off"], "a": 2, "e": "list-style-type: none removes bullets from <ul> and numbers from <ol>."}, {"s": "Tables & Lists", "d": "hard", "q": "What is a description list most semantically appropriate for?", "o": ["Product categories", "Navigation menus", "Glossaries, key-value pairs, FAQs", "Numbered steps"], "a": 2, "e": "<dl> is ideal for glossaries (term + definition), metadata (key: value), and FAQ (question + answer) layouts."}, {"s": "Tables & Lists", "d": "hard", "q": "How many `<dd>` elements can follow a single `<dt>` in a description list?", "o": ["Only one", "Exactly two", "As many as needed", "None — dd must come before dt"], "a": 2, "e": "One <dt> can be followed by multiple <dd> elements, for example listing multiple definitions of one term."}, {"s": "Tables & Lists", "d": "hard", "q": "Which table element is rendered visually identical to `<td>` but is semantically a header?", "o": ["<th>", "<thead>", "<tr>", "<tc>"], "a": 0, "e": "<th> and <td> look similar but <th> has semantic meaning (it's a header cell), important for screen readers."}, {"s": "Tables & Lists", "d": "hard", "q": "What does the `summary` attribute on `<table>` provide? (deprecated in HTML5)", "o": ["A caption shown above", "An accessible description for screen readers", "A tooltip on hover", "A download summary"], "a": 1, "e": "summary was used to describe table structure for screen readers. It's now deprecated — use <caption> instead."}, {"s": "Tables & Lists", "d": "hard", "q": "Which attribute on `<col>` applies a style to every Nth column?", "o": ["span", "count", "every", "repeat"], "a": 0, "e": "span=\"2\" on <col> applies the column's properties to 2 consecutive columns."}, {"s": "Tables & Lists", "d": "hard", "q": "Can a table be nested inside a `<td>` element?", "o": ["No, never", "Yes, nested tables are valid HTML", "Only in HTML4", "Only with class='nested'"], "a": 1, "e": "Tables can be nested inside <td> elements. It's valid HTML though generally discouraged for layout purposes."}, {"s": "Tables & Lists", "d": "hard", "q": "Which HTML structure creates a two-column key-value layout best semantically?", "o": ["<table> with two <td>s", "<dl> with <dt> and <dd>", "<ul> with two <li>s", "<div> with two <span>s"], "a": 1, "e": "<dl><dt>Key<\/dt><dd>Value<\/dd><\/dl> is the most semantic structure for key-value pairs."}, {"s": "Tables & Lists", "d": "hard", "q": "Which attribute on `<table>` defined the alignment of cell content? (deprecated)", "o": ["align", "valign", "text-align", "justify"], "a": 0, "e": "align=\"center\" on <table>, <tr>, <td> was used for alignment but is now deprecated — use CSS text-align."}, {"s": "Tables & Lists", "d": "hard", "q": "What is the correct order of structural table elements inside `<table>`?", "o": ["thead, tfoot, tbody", "tbody, thead, tfoot", "thead, tbody, tfoot", "tfoot, thead, tbody"], "a": 0, "e": "Correct order is <thead>, then optionally <tfoot>, then <tbody>. Browsers re-render tfoot at the bottom regardless."}, {"s": "Tables & Lists", "d": "hard", "q": "Which element was used in HTML4 for frameset-based layouts but is now obsolete?", "o": ["<frame>", "<frameset>", "<iframe>", "All of A and B"], "a": 3, "e": "<frameset> and <frame> are obsolete in HTML5. <iframe> is still valid for embedding external content."}, {"s": "Tables & Lists", "d": "hard", "q": "Which CSS display value makes a `<div>` behave like a table?", "o": ["display: grid", "display: table", "display: block-table", "display: flex"], "a": 1, "e": "display: table makes a <div> act as a <table>, allowing children with display: table-cell to align in columns."}, {"s": "Tables & Lists", "d": "hard", "q": "Which CSS property is used for modern grid-based two-dimensional layouts (replacing table layouts)?", "o": ["display: table", "display: flex", "display: grid", "display: columns"], "a": 2, "e": "CSS Grid (display: grid) is the modern standard for two-dimensional layouts, replacing table-based layouts."}, {"s": "Tables & Lists", "d": "hard", "q": "Which ARIA role should be added to a `<div>` that visually acts as a table?", "o": ["role=\"data\"", "role=\"table\"", "role=\"grid\"", "role=\"list\""], "a": 1, "e": "role=\"table\" with role=\"row\" and role=\"cell\" on children makes a div-based table accessible."}, {"s": "Tables & Lists", "d": "hard", "q": "Which attribute on `<ol>` or `<li>` was used to set the list style type?", "o": ["marker", "type", "style", "bullet"], "a": 1, "e": "type=\"I\" (Roman), \"A\" (uppercase letters), \"a\" (lowercase) were set on <ol> or individual <li> elements."}, {"s": "Tables & Lists", "d": "hard", "q": "Which CSS property lets you use a custom image as a list bullet?", "o": ["list-style-image", "bullet-image", "list-icon", "list-background"], "a": 0, "e": "list-style-image: url('bullet.png') sets a custom image as the list marker for <ul> or <ol>."}, {"s": "Tables & Lists", "d": "hard", "q": "What does `border-collapse: collapse` do to a table in CSS?", "o": ["Removes the table", "Makes borders share a single line instead of doubling", "Hides the table borders", "Collapses empty rows"], "a": 1, "e": "border-collapse: collapse merges adjacent cell borders into one line, eliminating double-borders."}, {"s": "Tables & Lists", "d": "hard", "q": "What is the default value of `border-collapse` for HTML tables?", "o": ["collapse", "merge", "separate", "none"], "a": 2, "e": "The default is border-collapse: separate, which means each cell has its own border with a gap between them."}, {"s": "Tables & Lists", "d": "hard", "q": "Which CSS property sets the gap between table cells when `border-collapse` is `separate`?", "o": ["cell-gap", "table-gap", "border-spacing", "cell-spacing"], "a": 2, "e": "border-spacing: 4px sets horizontal and vertical space between cells (replaces cellspacing attribute)."}]</script>
<script>
// ── HELPERS ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(s){return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>');}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── SOUND ──
let soundOn=true;
const AC=window.AudioContext||window.webkitAudioContext;
let ac=null;
function getAC(){if(!ac&&AC)ac=new AC();return ac;}
function beep(freq,dur,type='sine',vol=0.18){
  try{const a=getAC();if(!a||!soundOn)return;
  const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.start();o.stop(a.currentTime+dur);}catch(e){}
}
function playCorrect(){beep(660,.12);setTimeout(()=>beep(880,.18),100);}
function playWrong(){beep(220,.25,'sawtooth',.12);}
function playSkip(){beep(440,.15,'triangle',.1);}
function playTick(){beep(800,.04,'square',.05);}
function playTimeUp(){beep(300,.4,'sawtooth',.15);}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('sound-pill').classList.toggle('on',soundOn);
  document.getElementById('sound-icon').textContent=soundOn?'🔊':'🔇';
}

// ── FULL QUESTION BANK (300 questions) ──
const BANK=JSON.parse(document.getElementById("qdata").textContent);

// ── STATE ──
let cor=0,wrg=0,skp=0,ans=0;
let shuffled=[];
let timerInterval=null;
let currentTimerQi=-1;
let timeLeft=30;
const TOT_PER_QUIZ=shuffled.length;
const tStats={};

// ── BUILD ──
function buildQuiz(){
  clearInterval(timerInterval);
  cor=0;wrg=0;skp=0;ans=0;
  shuffled=shuffle([...BANK]);
  document.getElementById('q-count-meta').textContent=shuffled.length+' Questions · Mixed Difficulty · 30s Timer · Shuffle';
  Object.keys(tStats).forEach(k=>delete tStats[k]);
  shuffled.forEach(q=>{if(!tStats[q.s])tStats[q.s]={c:0,t:0};tStats[q.s].t++;});
  const main=document.getElementById('quiz-main');
  document.querySelectorAll('.sec-head,.q-card').forEach(e=>e.remove());
  document.getElementById('final-panel').style.display='none';
  let lastS=null;
  const fin=document.getElementById('final-panel');
  shuffled.forEach((q,i)=>{
    if(q.s!==lastS){
      lastS=q.s;
      const sh=document.createElement('div');
      sh.className='sec-head';
      sh.innerHTML=`<span class="sec-num">Section</span><div class="sec-body"><div class="sec-name">${esc(q.s)}</div><div class="sec-line"></div></div>`;
      main.insertBefore(sh,fin);
    }
    const L=['A','B','C','D'];
    const optsH=q.o.map((o,j)=>`<button class="opt-btn" onclick="pick(${i},${j})"><span class="opt-letter">${L[j]}</span><span>${fmt(o)}</span></button>`).join('');
    const card=document.createElement('div');
    card.className='q-card';
    card.id=`qc${i}`;
    card.innerHTML=`
      <div class="q-top">
        <span class="q-num-tag">Q${i+1}</span>
        <span class="q-text">${fmt(q.q)}</span>
        <span class="diff-pip diff-${q.d}">${q.d}</span>
      </div>
      <div class="opts" id="opts${i}">${optsH}</div>
      <div class="skip-row"><button class="skip-btn" id="skip${i}" onclick="skipQ(${i})">Skip →</button></div>
      <div class="fb-strip" id="fb${i}"></div>`;
    main.insertBefore(card,fin);
  });
  updateBoard();
  startTimerFor(0);
}

// ── TIMER ──
function startTimerFor(qi){
  clearInterval(timerInterval);
  if(qi>=shuffled.length)return;
  const card=document.getElementById(`qc${qi}`);
  if(!card||card.classList.contains('state-correct')||card.classList.contains('state-wrong')||card.classList.contains('state-skipped'))return;

  // remove active highlight from old
  document.querySelectorAll('.q-card.active-card').forEach(c=>c.classList.remove('active-card'));
  if(card){card.classList.add('active-card');card.scrollIntoView({behavior:'smooth',block:'nearest'});}

  currentTimerQi=qi;
  timeLeft=30;
  renderTimer(30,30);

  timerInterval=setInterval(()=>{
    timeLeft--;
    renderTimer(timeLeft,30);
    if(timeLeft<=5)playTick();
    if(timeLeft<=0){
      clearInterval(timerInterval);
      playTimeUp();
      autoSkip(qi);
    }
  },1000);
}

function renderTimer(t,max){
  const num=document.getElementById('timer-num');
  const fill=document.getElementById('timer-fill');
  const ring=document.getElementById('ring-fg');
  const bar=document.getElementById('timer-bar');
  num.textContent=t;
  const pct=(t/max)*100;
  // linear bar
  fill.style.width=pct+'%';
  // SVG ring: dashoffset goes from 0 (full) to 100 (empty)
  if(ring) ring.style.strokeDashoffset=(100-pct).toString();
  const warn=t<=8;
  num.classList.toggle('warn',warn);
  fill.classList.toggle('warn',warn);
  if(ring) ring.classList.toggle('warn',warn);
  if(bar)  bar.classList.toggle('warn-glow',warn);
}

function nextUnanswered(from){
  for(let i=from;i<shuffled.length;i++){
    const c=document.getElementById(`qc${i}`);
    if(c&&!c.classList.contains('state-correct')&&!c.classList.contains('state-wrong')&&!c.classList.contains('state-skipped'))return i;
  }
  return -1;
}

function autoSkip(qi){
  const card=document.getElementById(`qc${qi}`);
  if(!card||card.classList.contains('state-correct')||card.classList.contains('state-wrong')||card.classList.contains('state-skipped'))return;
  doSkip(qi);
}

// ── PICK ──
function pick(qi,oi){
  const q=shuffled[qi];
  const ow=document.getElementById(`opts${qi}`);
  const fb=document.getElementById(`fb${qi}`);
  const card=document.getElementById(`qc${qi}`);
  const sb=document.getElementById(`skip${qi}`);
  if(!ow||ow.querySelector('.opt-btn:disabled'))return;
  clearInterval(timerInterval);
  ow.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(sb)sb.disabled=true;
  card.classList.remove('active-card');
  const ok=(oi===q.a);
  ow.querySelectorAll('.opt-btn').forEach((b,j)=>{
    if(j===q.a)b.classList.add('opt-correct');
    else if(j===oi&&!ok)b.classList.add('opt-wrong');
    else b.classList.add('opt-dim');
  });
  fb.classList.add('show');
  if(ok){
    fb.className='fb-strip show fb-ok';
    fb.innerHTML=`<span class="fb-icon">&#10003;</span><span>Correct!</span><button class="expl-toggle" onclick="toggleExpl(${qi})">Show explanation</button><div class="expl-box" id="expl${qi}">${fmt(q.e)}</div>`;
    card.classList.add('state-correct');
    cor++;tStats[q.s].c++;
    playCorrect();
  } else {
    const cl=['A','B','C','D'][q.a];
    fb.className='fb-strip show fb-bad';
    fb.innerHTML=`<span class="fb-icon">&#10007;</span><span>Incorrect.</span><span class="fb-note">&nbsp;&middot; Correct: ${cl} &mdash; ${fmt(q.o[q.a])}</span><button class="expl-toggle" onclick="toggleExpl(${qi})">Show explanation</button><div class="expl-box" id="expl${qi}">${fmt(q.e)}</div>`;
    card.classList.add('state-wrong');
    wrg++;
    playWrong();
  }
  ans++;updateBoard();
  const next=nextUnanswered(qi+1);
  if(next>=0)setTimeout(()=>startTimerFor(next),600);
  else setTimeout(showFinal,600);
}

function toggleExpl(qi){
  const box=document.getElementById(`expl${qi}`);
  if(box){box.classList.toggle('show');
  const btn=box.previousElementSibling;
  if(btn)btn.textContent=box.classList.contains('show')?'Hide explanation':'Show explanation';}
}

// ── SKIP ──
function skipQ(qi){
  const card=document.getElementById(`qc${qi}`);
  if(!card||card.classList.contains('state-correct')||card.classList.contains('state-wrong')||card.classList.contains('state-skipped'))return;
  doSkip(qi);
}

function doSkip(qi){
  const q=shuffled[qi];
  const ow=document.getElementById(`opts${qi}`);
  const fb=document.getElementById(`fb${qi}`);
  const card=document.getElementById(`qc${qi}`);
  const sb=document.getElementById(`skip${qi}`);
  clearInterval(timerInterval);
  ow.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(sb)sb.disabled=true;
  card.classList.remove('active-card');
  const cl=['A','B','C','D'][q.a];
  fb.className='fb-strip show fb-skip';
  fb.innerHTML=`<span class="fb-icon">&#9654;</span><span>Skipped.</span><span class="fb-note">&nbsp;&middot; Answer was: ${cl} &mdash; ${fmt(q.o[q.a])}</span>`;
  card.classList.add('state-skipped');
  skp++;ans++;
  updateBoard();
  playSkip();
  const next=nextUnanswered(qi+1);
  if(next>=0)setTimeout(()=>startTimerFor(next),400);
  else setTimeout(showFinal,400);
}

// ── BOARD ──
function updateBoard(){
  document.getElementById('st-ans').textContent=ans;
  document.getElementById('st-cor').textContent=cor;
  document.getElementById('st-wrg').textContent=wrg;
  document.getElementById('st-skp').textContent=skp;
  const tot=shuffled.length;
  const answered_non_skip=cor+wrg;
  document.getElementById('st-pct').textContent=answered_non_skip>0?Math.round(cor/answered_non_skip*100)+'%':'--';
  document.getElementById('prog-fill').style.width=Math.round(ans/tot*100)+'%';
  document.getElementById('prog-txt').textContent=`${ans} / ${tot}`;
}

// ── FINAL ──
function showFinal(){
  clearInterval(timerInterval);
  renderTimer(0,30);
  const tot=shuffled.length;
  const pct=Math.round(cor/(cor+wrg||1)*100);
  document.getElementById('fin-score').textContent=pct+'%';
  document.getElementById('fin-detail').textContent=`${cor} correct · ${wrg} wrong · ${skp} skipped · ${tot} total`;
  const g=pct>=90?'Exceptional — Expert Level 🏆'
          :pct>=75?'Proficient — Well Done 🎯'
          :pct>=55?'Developing — Keep Practicing 📘'
          :'Needs Review — Study the Basics 📖';
  document.getElementById('fin-grade').textContent=g;
  const bd=document.getElementById('fin-breakdown');
  bd.innerHTML=Object.entries(tStats).map(([n,v])=>`<div class="bd-cell"><div class="bd-topic">${esc(n)}</div><div class="bd-score">${v.c}<span class="bd-out">/${v.t}</span></div></div>`).join('');
  const panel=document.getElementById('final-panel');
  panel.style.display='block';
  panel.scrollIntoView({behavior:'smooth',block:'center'});
}

// ── SHARE ──
function shareResult(){
  const score=document.getElementById('fin-score').textContent;
  const detail=document.getElementById('fin-detail').textContent;
  const grade=document.getElementById('fin-grade').textContent;
  const text=`HTML Mastery Quiz Result\n${score} — ${grade}\n${detail}\n\nTry it yourself!`;
  if(navigator.share){
    navigator.share({title:'HTML Quiz Result',text}).catch(()=>copyText(text));
  } else {
    copyText(text);
  }
}

function copyText(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showToast());
  } else {
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    showToast();
  }
}

function showToast(){
  const t=document.getElementById('share-toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function restartQuiz(){
  window.scrollTo({top:0,behavior:'smooth'});
  buildQuiz();
}

buildQuiz();
</script>
